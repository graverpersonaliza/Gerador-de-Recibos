
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Recibos</title>

<style>
:root{
 --bg:#eef3f9;
 --card:#ffffff;
 --border:#d9e2ef;
 --text:#1e293b;
 --primary:#2563eb;
}

body.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --border:#334155;
 --text:#f8fafc;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
 background:var(--bg);
 color:var(--text);
 font-family:Arial,sans-serif;
 padding:20px;
 transition:.3s;
}

.container{max-width:1250px;margin:auto}

.topbar{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:18px;
 padding:20px 24px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:20px;
}

.actions{display:flex;gap:10px;flex-wrap:wrap}

.btn{
 padding:14px 18px;
 border:none;
 border-radius:12px;
 cursor:pointer;
 font-weight:bold;
}

.btn-primary{
 background:var(--primary);
 color:white;
}

.btn-outline{
 background:transparent;
 border:1px solid var(--primary);
 color:var(--primary);
}

.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:18px;
 padding:24px;
}

.tabs{
 display:flex;
 gap:10px;
 margin-bottom:20px;
 flex-wrap:wrap;
}

.tab{
 padding:14px 20px;
 border-radius:12px;
 border:1px solid var(--border);
 background:var(--card);
 cursor:pointer;
 font-weight:bold;
}

.tab.active{
 background:#eff6ff;
 border:2px solid var(--primary);
 color:var(--primary);
}

.tab-content{display:none}
.tab-content.active{display:block}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
 gap:18px;
}

.full{grid-column:1/-1}

label{
 display:block;
 margin-bottom:10px;
 font-weight:bold;
}

input,textarea,select{
 width:100%;
 padding:11px 12px;
 border-radius:12px;
 border:1px solid var(--border);
 background:var(--card);
 color:var(--text);
}

textarea{min-height:120px}

.assinatura{
 width:100%;
 max-width:320px;
 height:120px;
 border:2px dashed #60a5fa;
 border-radius:12px;
 background:white;
 touch-action:none;
}

.preview{
 margin-top:24px;
 border:1px solid var(--border);
 border-radius:18px;
 padding:24px;
 background:var(--card);
}

.historico-item{
 padding:11px 12px;
 border-bottom:1px solid var(--border);
}

.pagamento-item{
 padding:12px;
 border:1px solid var(--border);
 border-radius:12px;
 margin-top:10px;
}

@media(max-width:768px){
 .topbar{
  flex-direction:column;
  align-items:flex-start;
  gap:14px;
 }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">

// formatar data
function formatarData(data){

 if(!data) return '';

 const [ano,mes,dia] = data.split('-');

 return `${dia}/${mes}/${ano}`;

}

// moeda real
function aplicarMascaraMoeda(id){

 const campo = document.getElementById(id);

 campo.addEventListener('input', e=>{

   let v = e.target.value.replace(/\D/g,'');

   v = (Number(v)/100).toFixed(2) + '';

   v = v.replace('.',',');

   v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g,'$1.');

   e.target.value = 'R$ ' + v;

 });

}

aplicarMascaraMoeda('valor');
aplicarMascaraMoeda('valorSimples');

// CEP automático
document.getElementById('cep').addEventListener('blur', async ()=>{

 const cep = document.getElementById('cep').value.replace(/\D/g,'');

 if(cep.length !== 8) return;

 try{

  const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);

  const data = await response.json();

  if(!data.erro){

    document.getElementById('logradouro').value = data.logradouro || '';
document.getElementById('bairro').value = data.bairro || '';
document.getElementById('cidade').value = data.localidade || '';
document.getElementById('uf').value = data.uf || '';

  }

 }catch(e){
  console.log(e);
 }

});


</script>

</head>

<body>

<div class="container">

<div>

<option>Março</option>

<script>

// tema
const toggleTheme = document.getElementById('toggleTheme');

if(localStorage.getItem('theme')==='dark'){
 document.body.classList.add('dark');
}

toggleTheme.addEventListener('click',()=>{
 document.body.classList.toggle('dark');

 localStorage.setItem(
  'theme',
  document.body.classList.contains('dark') ? 'dark':'light'
 );
});

// tabs
document.querySelectorAll('.tab').forEach(tab=>{
 tab.addEventListener('click',()=>{

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));

  tab.classList.add('active');

  document.getElementById(tab.dataset.tab).classList.add('active');

 });
});

document.getElementById('btnHistorico').onclick=()=>{
 document.querySelector('[data-tab="historico"]').click();
}

document.getElementById('btnNovo').onclick=()=>{
 document.querySelector('[data-tab="aluguel"]').click();
}

// assinatura aluguel
const canvas = document.getElementById('assinaturaCanvas');
const ctx = canvas.getContext('2d');

// assinatura simples
const canvasS = document.getElementById('assinaturaSimples');
const ctxS = canvasS.getContext('2d');

function configurarAssinatura(canvas,ctx){

 canvas.width=320;
 canvas.height=120;

 ctx.lineWidth=2;
 ctx.lineCap='round';

 let desenhando=false;

 function pos(e){

  const rect = canvas.getBoundingClientRect();

  if(e.touches){
   return {
    x:e.touches[0].clientX - rect.left,
    y:e.touches[0].clientY - rect.top
   }
  }

  return {
   x:e.offsetX,
   y:e.offsetY
  }
 }

 function iniciar(e){
  desenhando=true;

  const p=pos(e);

  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
 }

 function desenhar(e){

  if(!desenhando) return;

  e.preventDefault();

  const p=pos(e);

  ctx.lineTo(p.x,p.y);
  ctx.stroke();
 }

 function parar(){
  desenhando=false;
 }

 canvas.addEventListener('mousedown',iniciar);
 canvas.addEventListener('mousemove',desenhar);
 canvas.addEventListener('mouseup',parar);

 canvas.addEventListener('touchstart',iniciar);
 canvas.addEventListener('touchmove',desenhar);
 canvas.addEventListener('touchend',parar);

}

configurarAssinatura(canvas,ctx);
configurarAssinatura(canvasS,ctxS);

function limparAssinatura(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
}

function limparAssinaturaSimples(){
 ctxS.clearRect(0,0,canvasS.width,canvasS.height);
}

// parcelas
function adicionarParcela(){

 const container=document.getElementById('parcelas');

 const qtd=container.children.length + 1;

 const div=document.createElement('div');

 div.className='pagamento-item';

 div.innerHTML=`
 <strong>Parcela ${qtd}</strong>
 <div style="margin-top:10px;">
  <input placeholder="Ex: 500,00">
 </div>

 
<div style="margin-top:10px;">
  <input type="date" style="max-width:190px;">
 </div>

 <div style="margin-top:10px;">
  <button class="btn btn-outline" onclick="this.closest('.pagamento-item').remove()">🗑 Excluir</button>
 </div>
 `;


 container.appendChild(div);

}



// formatar moeda BRL
function formatarMoeda(valor){

 if(!valor) return 'R$ 0,00';

 if(valor.includes('R$')) return valor;

 let numero = Number(valor.replace(',','.'));

 if(isNaN(numero)) numero = 0;

 return numero.toLocaleString('pt-BR',{
  style:'currency',
  currency:'BRL'
 });

}

// formatar data DD/MM/AAAA
function formatarDataBR(data){

 if(!data) return '';

 const partes = data.split('-');

 return `${partes[2]}/${partes[1]}/${partes[0]}`;

}


// preview aluguel
function visualizar(){

 const parcelas=[...document.querySelectorAll('#parcelas .pagamento-item')].map((p,i)=>{

  const inputs=p.querySelectorAll('input');

  return `
   <p style="margin-top:10px;">
   <strong>Pagamento ${i+1}</strong><br>
Valor: ${formatarMoeda(inputs[0].value)}<br>
Data: ${formatarDataBR(inputs[1].value)}
   </p>
  `;
 }).join('');

 const html=`
 <h1>RECIBO DE ALUGUEL</h1>

 <p style="margin-top:18px;"><strong>LOCADOR:</strong> ${locador.value} (CPF: ${cpfLocador.value})</p>

 <p style="margin-top:10px;"><strong>LOCATÁRIO:</strong> ${locatario.value} (CPF: ${cpfLocatario.value})</p>

 <p style="margin-top:10px;"><strong>IMÓVEL:</strong> ${logradouro.value}, Nº ${numero.value} - ${bairro.value} - ${cidade.value}/${uf.value} - CEP ${cep.value}</p>

 <p style="margin-top:10px;"><strong>REFERÊNCIA:</strong> ${mes.value}/${ano.value}</p>

 <p style="margin-top:10px;"><strong>VALOR:</strong> ${valor.value}</p>

 <p style="margin-top:10px;"><strong>FORMA DE PAGAMENTO:</strong> ${forma.value}</p>

 <p style="margin-top:10px;"><strong>DATA DO PAGAMENTO:</strong> ${formatarData(dataPagamento.value)}</p>

 ${parcelas}

 <div style="margin-top:30px; border-top:1px solid #ccc; padding-top:14px;">
   <strong>OBSERVAÇÕES:</strong><br>
   ${obs.value.replaceAll('\n','<br>')}
 </div>

 <div style="margin-top:20px;">
  <img src="${canvas.toDataURL()}" style="max-width:220px; display:block; margin-bottom:-8px;">

  ______________________________________
  <br>

  <span style="font-size:13px;">Assinatura</span>
 </div>
 `;

 document.getElementById('preview').innerHTML=html;

 

}

// preview simples
function visualizarSimples(){

 const html=`
 <h1>RECIBO SIMPLES</h1>

 <p style="margin-top:18px;"><strong>EMISSOR:</strong> ${emissor.value}</p>

 <p style="margin-top:10px;"><strong>CPF EMISSOR:</strong> ${cpfEmissor.value}</p>

 <p style="margin-top:10px;"><strong>PAGADOR:</strong> ${pagador.value}</p>

 <p style="margin-top:10px;"><strong>CPF PAGADOR:</strong> ${cpfPagador.value}</p>

 <p style="margin-top:10px;"><strong>VALOR:</strong> ${formatarMoeda(valorSimples.value)}</p>

 <p style="margin-top:10px;"><strong>DATA:</strong> ${formatarData(dataSimples.value)}</p>

 <p style="margin-top:10px;"><strong>REFERENTE:</strong><br>${referenteSimples.value.replaceAll('\n','<br>')}</p>

 <div style="margin-top:20px;">
  <img src="${canvasS.toDataURL()}" style="max-width:220px; display:block; margin-bottom:-8px;">

  ______________________________________
  <br>

  <span style="font-size:13px;">Assinatura</span>
 </div>
 `;

 document.getElementById('previewSimples').innerHTML=html;

 

}

// historico
function salvarHistorico(tipo,nome,valorRecibo){

 const historico = JSON.parse(localStorage.getItem('historicoRecibos')) || [];

 historico.push({
  tipo,
  nome,
  valor:valorRecibo,
  data:new Date().toLocaleDateString('pt-BR')
 });

 localStorage.setItem('historicoRecibos',JSON.stringify(historico));

 carregarHistorico();

}

function carregarHistorico(){

 const historico = JSON.parse(localStorage.getItem('historicoRecibos')) || [];

 historicoLista.innerHTML='';

 historico.reverse().forEach(item=>{

  historicoLista.innerHTML += `
  <div class="historico-item">

   <strong>Pessoas:</strong> ${item.nome}<br>

   <strong>Valor:</strong> ${formatarMoeda(item.valor)}<br>

   <strong>Data:</strong> ${item.data}

  </div>
  `;

 });

}

carregarHistorico();

function limparHistorico(){

 localStorage.removeItem('historicoRecibos');

 carregarHistorico();

}

// pdf
async function gerarPDF(){

 if(preview.innerHTML.trim()===''){
  alert('Visualize o recibo primeiro');
  return;
 }

 const canvasPDF = await html2canvas(preview,{scale:2});

 const imagem = canvasPDF.toDataURL('image/png');

 const {jsPDF}=window.jspdf;

 const pdf = new jsPDF('p','mm','a4');

 const largura = 190;
 const altura = canvasPDF.height * largura / canvasPDF.width;

 pdf.addImage(imagem,'PNG',10,10,largura,altura);

 pdf.save('recibo-aluguel.pdf');

salvarHistorico(
 'Aluguel',
 `${locador.value} → ${locatario.value}`,
 valor.value
);

}

async function gerarPDFSimples(){

 if(previewSimples.innerHTML.trim()===''){
  alert('Visualize o recibo primeiro');
  return;
 }

 const canvasPDF = await html2canvas(previewSimples,{scale:2});

 const imagem = canvasPDF.toDataURL('image/png');

 const {jsPDF}=window.jspdf;

 const pdf = new jsPDF('p','mm','a4');

 const largura = 190;
 const altura = canvasPDF.height * largura / canvasPDF.width;

 pdf.addImage(imagem,'PNG',10,10,largura,altura);

 pdf.save('recibo-simples.pdf');

salvarHistorico(
 'Simples',
 `${emissor.value} → ${pagador.value}`,
 valorSimples.value
);

}

aplicarMascaraMoeda('valor');
aplicarMascaraMoeda('valorSimples');

</script>

</body>
