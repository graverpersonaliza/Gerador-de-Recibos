<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Recibos - Standalone</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 10px; }
    .nav-tabs { display:flex; gap:8px; margin: 16px 0; }
    .nav-tab { padding:10px 16px; background:#f3f4f6; border-radius:6px; cursor:pointer; font-weight:600; }
    .nav-tab.active { background:#fff; border:2px solid #3b82f6; color:#0b63d6; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px; }
    label { display:block; margin-top:8px; font-weight:600; }
    input, select, textarea { width:100%; padding:8px; margin-top:6px; border-radius:6px; border:1px solid #d1d5db; font-size:14px; }
    .inline-row { display:flex; gap:8px; }
    .inline-row input { flex:1; }
    .full-row { grid-column:1/-1; }
    .btn { margin-top:16px; padding:10px 16px; border:none; border-radius:6px; background:#3b82f6; color:white; cursor:pointer; font-weight:600; }
    .btn.secondary { background:#6b7280; }
    .recibo-box { display:none; margin-top:20px; padding:20px; border:1px solid #000; background:#fff; }
    .recibo-header { text-align:center; border-bottom:3px solid #374151; padding-bottom:12px; margin-bottom:18px; }
    .assinatura { margin-top:32px; text-align:center; }
    .action-buttons { display:flex; gap:8px; margin-top:16px; }
    @media print { body { background:white; } .container { box-shadow:none; } .action-buttons, .nav-tabs { display:none!important; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gerador de Recibos</h1>

    <div class="nav-tabs">
      <div class="nav-tab active" data-tab="aluguel">🏠 Recibo de Aluguel</div>
      <div class="nav-tab" data-tab="simples">📄 Recibo Simples</div>
    </div>

    <!-- Aba Aluguel -->
    <div id="aba-aluguel" class="tab" style="display:block;">
      <form id="form-aluguel">
        <div class="form-grid">
          <div>
            <label>Locador *</label>
            <div class="inline-row">
              <input type="text" id="locador" placeholder="Nome" required />
              <input type="text" id="cpfLocador" placeholder="CPF/CNPJ" style="max-width:180px;" />
            </div>

            <label>Locatário *</label>
            <div class="inline-row">
              <input type="text" id="locatario" placeholder="Nome" required />
              <input type="text" id="cpfLocatario" placeholder="CPF/CNPJ" style="max-width:180px;" />
            </div>
          </div>

          <div>
            <label>Mês de Referência *</label>
            <select id="mesReferencia" required>
              <option value="">Selecione</option>
              <option>Janeiro</option>
              <option>Fevereiro</option>
              <option>Março</option>
              <option>Abril</option>
              <option>Maio</option>
              <option>Junho</option>
              <option>Julho</option>
              <option>Agosto</option>
              <option>Setembro</option>
              <option>Outubro</option>
              <option>Novembro</option>
              <option>Dezembro</option>
            </select>

            <label>Ano *</label>
            <input type="number" id="ano" value="2025" required />

            <label>Tipo de Imóvel</label>
            <input type="text" id="tipoImovel" placeholder="Ex: Apartamento" />
          </div>

          <div class="full-row">
            <label>Endereço Completo do Imóvel *</label>
            <div class="inline-row">
              <input type="text" id="cep" placeholder="CEP" required style="max-width:120px;" />
              <input type="text" id="endereco" placeholder="Endereço do imóvel" required />
              <input type="text" id="numero" placeholder="Nº" required style="max-width:90px;" />
              <input type="text" id="bairro" placeholder="Bairro" required style="max-width:160px;" />
              <input type="text" id="cidade" placeholder="Cidade" required style="max-width:160px;" />
              <input type="text" id="uf" placeholder="UF" required style="max-width:80px;" />
            </div>
            <label>Complemento</label>
            <input type="text" id="complemento" />
          </div>

          <div>
            <label>Valor (R$) *</label>
            <input type="number" id="valorAluguel" step="0.01" required />

            <label>Forma de Pagamento *</label>
            <select id="formaPagamentoAluguel" required>
              <option>Dinheiro</option>
              <option>Pix</option>
              <option>Cheque</option>
              <option>Transferência/Depósito</option>
              <option>Cartão</option>
            </select>

            <label>Data do Pagamento *</label>
            <input type="date" id="dataPagamentoAluguel" required />
          </div>

          <div class="full-row">
            <label>Observações</label>
            <textarea id="observacaoAluguel" rows="3" placeholder="Observações adicionais..."></textarea>
          </div>

          <div class="full-row">
            <label><input type="checkbox" id="duasViasAluguel" /> Gerar recibo em duas vias</label>
          </div>
        </div>

        <div style="text-align:center; margin-top:12px;">
          <button type="button" class="btn" id="btnGerarAluguel">🏠 Gerar Recibo de Aluguel</button>
        </div>
      </form>
    </div>

    <!-- Aba Simples -->
    <div id="aba-simples" class="tab" style="display:none;">
      <form id="form-simples">
        <div class="form-grid">
          <div>
            <label>Valor *</label>
            <input type="number" id="valorSimples" step="0.01" required />

            <label>Pagador *</label>
            <div class="inline-row">
              <input type="text" id="pagadorNome" placeholder="Nome do pagador" required />
              <input type="text" id="pagadorCpf" placeholder="CPF/CNPJ" style="max-width:180px;" />
            </div>

            <label>Emissor (quem recebe)</label>
            <div class="inline-row">
              <input type="text" id="emissorNome" placeholder="Nome do emissor" />
              <input type="text" id="emissorCpf" placeholder="CPF/CNPJ" style="max-width:180px;" />
            </div>

            <label>Referente a</label>
            <input type="text" id="referente" placeholder="prestação de serviços, aluguel, etc." />
          </div>

          <div>
            <label>Cidade *</label>
            <input type="text" id="cidadeSimples" required />

            <label>Data do Pagamento *</label>
            <input type="date" id="dataPagamentoSimples" required />

            <label>Forma de Pagamento *</label>
            <select id="formaPagamentoSimples" required>
              <option>Dinheiro</option>
              <option>Pix</option>
              <option>Cheque</option>
              <option>Transferência/Depósito</option>
              <option>Cartão</option>
            </select>

            <label>Telefone (opcional)</label>
            <input type="text" id="telefoneSimples" placeholder="(11) 99999-9999" />
          </div>

          <div class="full-row">
            <label>Observações</label>
            <textarea id="observacaoSimples" rows="3" placeholder="Observações adicionais..."></textarea>
          </div>

          <div class="full-row">
            <label><input type="checkbox" id="duasViasSimples" /> Gerar recibo em duas vias</label>
          </div>
        </div>

        <div style="text-align:center; margin-top:12px;">
          <button type="button" class="btn" id="btnGerarSimples">📄 Gerar Recibo Simples</button>
        </div>
      </form>
    </div>

    <!-- Área do Recibo -->
    <div id="reciboBox" class="recibo-box">
      <div id="reciboContent"></div>
      <div class="action-buttons">
        <button class="btn" id="btnImprimir">🖨️ Imprimir</button>
        <button class="btn secondary" id="btnEditar">✏️ Editar</button>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function(){
      // Navegação entre abas
      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          e.currentTarget.classList.add('active');
          const target = e.currentTarget.getAttribute('data-tab');
          document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
          document.getElementById('aba-' + target).style.display = 'block';
        });
      });

      // Define datas padrão (hoje) se vazio
      const today = new Date().toISOString().split('T')[0];
      const dAlug = document.getElementById('dataPagamentoAluguel');
      const dSimp = document.getElementById('dataPagamentoSimples');
      if(dAlug && !dAlug.value) dAlug.value = today;
      if(dSimp && !dSimp.value) dSimp.value = today;

      // Auto preenchimento de endereço via CEP
      const cepInput = document.getElementById('cep');
      cepInput.addEventListener('blur', async () => {
        try{
          const cep = cepInput.value.replace(/\D/g, '');
          if(cep.length === 8){
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if(!data.erro){
              // preenche somente se vazio para não sobrescrever
              if(document.getElementById('endereco').value.trim()==='') document.getElementById('endereco').value = data.logradouro || '';
              if(document.getElementById('bairro').value.trim()==='') document.getElementById('bairro').value = data.bairro || '';
              if(document.getElementById('cidade').value.trim()==='') document.getElementById('cidade').value = data.localidade || '';
              if(document.getElementById('uf').value.trim()==='') document.getElementById('uf').value = data.uf || '';
            }
          }
        }catch(err){
          console.error('Erro ao buscar CEP:', err);
        }
      });

      // ----- Função número por extenso (reais e centavos) -----
      function threeDigitsToWords(n){
        const unidades = ["zero","um","dois","três","quatro","cinco","seis","sete","oito","nove","dez","onze","doze","treze","quatorze","quinze","dezesseis","dezessete","dezoito","dezenove"];
        const dezenas = ["","","vinte","trinta","quarenta","cinquenta","sessenta","setenta","oitenta","noventa"];
        const centenas = ["","cento","duzentos","trezentos","quatrocentos","quinhentos","seiscentos","setecentos","oitocentos","novecentos"];
        n = Number(n);
        if(n === 0) return '';
        if(n === 100) return 'cem';
        let s = '';
        const c = Math.floor(n/100);
        const resto = n % 100;
        if(c > 0) s += centenas[c];
        if(resto > 0){
          if(s) s += ' e ';
          if(resto < 20) s += unidades[resto];
          else {
            const d = Math.floor(resto/10);
            const u = resto % 10;
            s += dezenas[d];
            if(u > 0) s += ' e ' + unidades[u];
          }
        }
        return s;
      }

      function numeroPorExtenso(valor){
        // valor: number (ex: 1234.56)
        let totalCentavos = Math.round((Number(valor) || 0) * 100);
        let reais = Math.floor(totalCentavos / 100);
        let centavos = totalCentavos % 100;

        if(reais === 0 && centavos === 0) return 'zero reais';

        // converte partes em grupos de 3 dígitos
        const escalasSingular = ['', 'mil', 'milhão', 'bilhão', 'trilhão'];
        const escalasPlural = ['', 'mil', 'milhões', 'bilhões', 'trilhões'];

        function intToWords(n){
          if(n === 0) return '';
          let grupos = [];
          while(n > 0){ grupos.push(n % 1000); n = Math.floor(n / 1000); }
          let partes = [];
          for(let i = grupos.length -1; i >= 0; i--){
            const g = grupos[i];
            if(g === 0) continue;
            const textoGrupo = threeDigitsToWords(g);
            if(i === 0){
              partes.push(textoGrupo);
            } else if(i === 1){
              if(g === 1) partes.push('mil');
              else partes.push(textoGrupo + ' mil');
            } else {
              if(g === 1) partes.push(textoGrupo + ' ' + escalasSingular[i]);
              else partes.push(textoGrupo + ' ' + escalasPlural[i]);
            }
          }
          if(partes.length === 0) return '';
          if(partes.length === 1) return partes[0];
          // juntar com vírgulas e ' e ' antes do último
          const last = partes.pop();
          return partes.join(', ') + ' e ' + last;
        }

        let textoReais = intToWords(reais);
        if(textoReais){
          textoReais += (reais === 1 ? ' real' : ' reais');
        }
        let textoCentavos = '';
        if(centavos > 0){
          const textoC = threeDigitsToWords(centavos);
          textoCentavos = textoC + (centavos === 1 ? ' centavo' : ' centavos');
        }

        if(textoReais && textoCentavos) return textoReais + ' e ' + textoCentavos;
        if(textoReais) return textoReais;
        return textoCentavos; // only centavos
      }

      // utilitários de formatação
      function formatarMoeda(v){
        const n = Number(v) || 0;
        return new Intl.NumberFormat('pt-BR', { style:'currency', currency:'BRL' }).format(n);
      }
      function formatarData(d){ if(!d) return ''; return new Date(d).toLocaleDateString('pt-BR'); }

      // Gerar Recibo de Aluguel (com todos os campos)
      document.getElementById('btnGerarAluguel').addEventListener('click', () => {
        const dados = {
          locador: (document.getElementById('locador').value || '').trim(),
          cpfLocador: (document.getElementById('cpfLocador').value || '').trim(),
          locatario: (document.getElementById('locatario').value || '').trim(),
          cpfLocatario: (document.getElementById('cpfLocatario').value || '').trim(),
          mes: (document.getElementById('mesReferencia').value || '').trim(),
          ano: (document.getElementById('ano').value || '').trim(),
          tipoImovel: (document.getElementById('tipoImovel').value || '').trim(),
          cep: (document.getElementById('cep').value || '').trim(),
          endereco: (document.getElementById('endereco').value || '').trim(),
          numero: (document.getElementById('numero').value || '').trim(),
          complemento: (document.getElementById('complemento').value || '').trim(),
          bairro: (document.getElementById('bairro').value || '').trim(),
          cidade: (document.getElementById('cidade').value || '').trim(),
          uf: (document.getElementById('uf').value || '').trim(),
          valor: (document.getElementById('valorAluguel').value || '').trim(),
          forma: (document.getElementById('formaPagamentoAluguel').value || '').trim(),
          data: (document.getElementById('dataPagamentoAluguel').value || '').trim(),
          observacao: (document.getElementById('observacaoAluguel').value || '').trim(),
          duasVias: document.getElementById('duasViasAluguel').checked
        };

        // validação
        if(!dados.locador || !dados.locatario || !dados.mes || !dados.ano || !dados.endereco || !dados.numero || !dados.bairro || !dados.cidade || !dados.uf || !dados.valor || !dados.forma || !dados.data){
          alert('Preencha todos os campos obrigatórios (*)');
          return;
        }

        const valorNum = parseFloat(dados.valor.replace(/,/g, '.')) || 0;
        let mainHtml = `<div class="recibo-header"><h2>RECIBO DE ALUGUEL</h2></div>`;
        mainHtml += `<p><strong>LOCADOR:</strong> ${dados.locador}${dados.cpfLocador ? ' (CPF/CNPJ: '+dados.cpfLocador+')' : ''}</p>`;
        mainHtml += `<p><strong>LOCATÁRIO:</strong> ${dados.locatario}${dados.cpfLocatario ? ' (CPF/CNPJ: '+dados.cpfLocatario+')' : ''}</p>`;
        mainHtml += `<p><strong>IMÓVEL:</strong> ${dados.tipoImovel ? dados.tipoImovel + ' - ' : ''}${dados.endereco}, ${dados.numero}${dados.complemento ? ' - '+dados.complemento : ''} - ${dados.bairro}, ${dados.cidade}/${dados.uf} - CEP: ${dados.cep}</p>`;
        mainHtml += `<p><strong>REFERÊNCIA:</strong> ${dados.mes}/${dados.ano}</p>`;
        mainHtml += `<p><strong>VALOR:</strong> ${formatarMoeda(valorNum)} (${numeroPorExtenso(valorNum)})</p>`;
        mainHtml += `<p><strong>FORMA DE PAGAMENTO:</strong> ${dados.forma}</p>`;
        mainHtml += `<p><strong>DATA DO PAGAMENTO:</strong> ${formatarData(dados.data)}</p>`;
        if(dados.observacao) mainHtml += `<p><strong>OBSERVAÇÕES:</strong> ${dados.observacao}</p>`;
        mainHtml += `<div class="assinatura">______________________________________<br>Assinatura</div>`;

        let finalHtml = mainHtml;
        if(dados.duasVias){
          finalHtml += `<hr style="border:2px dashed #ccc; margin-top:20px; margin-bottom:20px;">` + mainHtml.replace('RECIBO DE ALUGUEL','RECIBO DE ALUGUEL - 2ª VIA');
        }

        document.getElementById('reciboContent').innerHTML = finalHtml;
        document.getElementById('reciboBox').style.display = 'block';
        window.scrollTo(0, document.getElementById('reciboBox').offsetTop);
      });

      // Gerar Recibo Simples (completo)
      document.getElementById('btnGerarSimples').addEventListener('click', () => {
        const dados = {
          valor: (document.getElementById('valorSimples').value || '').trim(),
          pagadorNome: (document.getElementById('pagadorNome').value || '').trim(),
          pagadorCpf: (document.getElementById('pagadorCpf').value || '').trim(),
          emissorNome: (document.getElementById('emissorNome').value || '').trim(),
          emissorCpf: (document.getElementById('emissorCpf').value || '').trim(),
          referente: (document.getElementById('referente').value || '').trim(),
          cidade: (document.getElementById('cidadeSimples').value || '').trim(),
          data: (document.getElementById('dataPagamentoSimples').value || '').trim(),
          forma: (document.getElementById('formaPagamentoSimples').value || '').trim(),
          telefone: (document.getElementById('telefoneSimples').value || '').trim(),
          observacao: (document.getElementById('observacaoSimples').value || '').trim(),
          duasVias: document.getElementById('duasViasSimples').checked
        };

        if(!dados.valor || !dados.pagadorNome || !dados.cidade || !dados.data || !dados.forma){
          alert('Preencha todos os campos obrigatórios (*)');
          return;
        }

        const valorNum = parseFloat(dados.valor.replace(/,/g, '.')) || 0;
        let mainHtml = `<div class="recibo-header"><h2>RECIBO</h2></div>`;
        mainHtml += `<p><strong>Valor:</strong> ${formatarMoeda(valorNum)} (${numeroPorExtenso(valorNum)})</p>`;
        mainHtml += `<p><strong>Pagador:</strong> ${dados.pagadorNome}${dados.pagadorCpf ? ' (CPF/CNPJ: '+dados.pagadorCpf+')' : ''}</p>`;
        if(dados.emissorNome) mainHtml += `<p><strong>Emissor:</strong> ${dados.emissorNome}${dados.emissorCpf ? ' (CPF/CNPJ: '+dados.emissorCpf+')' : ''}</p>`;
        if(dados.referente) mainHtml += `<p><strong>Referente a:</strong> ${dados.referente}</p>`;
        mainHtml += `<p><strong>Cidade/Data:</strong> ${dados.cidade}, ${formatarData(dados.data)}</p>`;
        mainHtml += `<p><strong>Forma de Pagamento:</strong> ${dados.forma}</p>`;
        if(dados.telefone) mainHtml += `<p><strong>Telefone:</strong> ${dados.telefone}</p>`;
        if(dados.observacao) mainHtml += `<p><strong>Observações:</strong> ${dados.observacao}</p>`;
        mainHtml += `<div class="assinatura">______________________________________<br>Assinatura</div>`;

        let finalHtml = mainHtml;
        if(dados.duasVias){
          finalHtml += `<hr style="border:2px dashed #ccc; margin-top:20px; margin-bottom:20px;">` + mainHtml.replace('RECIBO','RECIBO - 2ª VIA');
        }

        document.getElementById('reciboContent').innerHTML = finalHtml;
        document.getElementById('reciboBox').style.display = 'block';
        window.scrollTo(0, document.getElementById('reciboBox').offsetTop);
      });

      // Imprimir / Editar
      document.getElementById('btnImprimir').addEventListener('click', () => window.print());
      document.getElementById('btnEditar').addEventListener('click', () => document.getElementById('reciboBox').style.display = 'none');

    });
  </script>
</body>
</html>
